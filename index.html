<html lang="it">

<head>

  <link rel="stylesheet" href="./css/styleProfile.css">

    </div>

    <div class="containers">
      <p class="title">I Miei socials</p>
      <div class="relative group customBTN">
        <div class="relative w-64 h-14 opacity-90 overflow-hidden rounded-xl bg-black z-10">
          <div
            class="absolute z-10 -translate-x-44 group-hover:translate-x-[30rem] ease-in transistion-all duration-700 h-full w-44 bg-gradient-to-r from-gray-500 to-white/10 opacity-30 -skew-x-12">
          </div>

          <div
            class="absolute flex items-center justify-center text-white z-[1] opacity-90 rounded-2xl inset-0.5 bg-black">
            <button name="text" class="input text-lg h-full opacity-90 w-full px-16 py-3 rounded-xl bg-black"
              id="steamBtn">
              Steam
            </button>
          </div>
          <div
            class="absolute duration-1000 group-hover:animate-spin w-full h-[100px] bg-gradient-to-r from-blue-500 to-black-500 blur-[30px]">
          </div>
        </div>
      </div>

      <div class="relative group customBTN">
        <div class="relative w-64 h-14 opacity-90 overflow-hidden rounded-xl bg-black z-10">
          <div
            class="absolute z-10 -translate-x-44 group-hover:translate-x-[30rem] ease-in transistion-all duration-700 h-full w-44 bg-gradient-to-r from-gray-500 to-white/10 opacity-30 -skew-x-12">
          </div>

          <div
            class="absolute flex items-center justify-center text-white z-[1] opacity-90 rounded-2xl inset-0.5 bg-black">
            <button name="text" class="input text-lg h-full opacity-90 w-full px-16 py-3 rounded-xl bg-black"
              id="discordBtn">
              Discord
            </button>
          </div>
          <div
            class="absolute duration-1000 group-hover:animate-spin w-full h-[100px] bg-gradient-to-r from-blue-800 to-cyan-700 blur-[30px]">
          </div>
        </div>
      </div>

      <div class="relative group customBTN">
        <div class="relative w-64 h-14 opacity-90 overflow-hidden rounded-xl bg-black z-10">
          <div
            class="absolute z-10 -translate-x-44 group-hover:translate-x-[30rem] ease-in transistion-all duration-700 h-full w-44 bg-gradient-to-r from-gray-500 to-white/10 opacity-30 -skew-x-12">
          </div>

          <div
            class="absolute flex items-center justify-center text-white z-[1] opacity-90 rounded-2xl inset-0.5 bg-black">
            <button name="text" class="input text-lg h-full opacity-90 w-full px-16 py-3 rounded-xl bg-black"
              id="youtubeBtn">
              Youtube
            </button>
          </div>
          <div
            class="absolute duration-1000 group-hover:animate-spin w-full h-[100px] bg-gradient-to-r from-red-200 to-red-700 blur-[30px]">
          </div>
        </div>
      </div>

      <div class="relative group customBTN">
        <div class="relative w-64 h-14 opacity-90 overflow-hidden rounded-xl bg-black z-10">
          <div
            class="absolute z-10 -translate-x-44 group-hover:translate-x-[30rem] ease-in transistion-all duration-700 h-full w-44 bg-gradient-to-r from-gray-500 to-white/10 opacity-30 -skew-x-12">
          </div>

          <div
            class="absolute flex items-center justify-center text-white z-[1] opacity-90 rounded-2xl inset-0.5 bg-black">
            <button name="text" class="input text-lg h-full opacity-90 w-full px-16 py-3 rounded-xl bg-black"
              id="instagramBtn">

              Instagram
            </button>
          </div>
          <div
            class="absolute duration-1000 group-hover:animate-spin w-full h-[100px] bg-gradient-to-r from-yellow-300 to-pink-500 blur-[30px]">
          </div>
        </div>
      </div>

    </div>

    <div class="containers">
      <p class="title">Giochi</p>
      <div class="container-btn">
        <button id="btn-game">Gioco #1</button>
      </div>
    </div>

  <div id="credits">
